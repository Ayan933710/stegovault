# Server port - Railway sets this automatically via environment variable
server.port=${PORT:8080}

# H2 file-based database - persists between restarts
spring.datasource.url=jdbc:h2:file:./stegovaultdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 browser console - useful for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Allow large image uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
```

# Timeout settings for Railway
server.tomcat.connection-timeout=120000
spring.mvc.async.request-timeout=120000

